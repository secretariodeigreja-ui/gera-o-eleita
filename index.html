            margin-bottom: 20px;
        }

        .start-screen p {

            font-size: 1.1em;

            line-height: 1.6;
        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1em;
            border-radius: 50px;

        }

        .start-button:hover {

        }

        .start-button:active {
            transform: translateY(0);
        }

        }

            margin-top: 30px;

        }

        }

            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        }

            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-align: right;
        }

        .score-text {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

            color: #333;
            font-size: 1.4em;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 600;
        }

            gap: 15px;
            margin-bottom: 30px;
        }

            align-items: center;

            background: #fff9c4;

        }

        .option.correct {
            background: #c8e6c9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .option.incorrect {
            background: #ffcdd2;
            border-color: #f44336;
            color: #c62828;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            font-weight: bold;
            color: #667eea;
            flex-shrink: 0;
        }

        .option.correct .option-letter {
            background: #4caf50;
            color: white;
        }

        .option.incorrect .option-letter {
            background: #f44336;
            color: white;
        }

        .option-text {
            flex: 1;
        }

            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.05em;
            text-align: center;

        }

        .feedback.correct {

            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

            margin-top: 30px;

        // Estado do Quiz
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;
        let answered = false;

        // Iniciar Quiz
        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            loadQuestion();
        }

        // Carregar Pergunta
        function loadQuestion() {
            const question = quizData[currentQuestion];
            answered = false;
            selectedAnswer = null;

            // Atualizar textos
            document.getElementById('progressText').textContent = `Pergunta ${currentQuestion + 1} de 61`;
            document.getElementById('scoreText').textContent = `Acertos: ${score}`;
            document.getElementById('questionText').textContent = question.question;

            // Atualizar barra de progresso
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Limpar feedback
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show', 'correct', 'incorrect');
            feedback.textContent = '';

            // Renderizar opções
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            question.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.onclick = () => selectAnswer(index);
                div.innerHTML = `
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                `;
                container.appendChild(div);
            });

            // Resetar botões
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('confirmBtn').style.display = 'block';
            document.getElementById('nextBtn').classList.remove('show');
        }

        // Selecionar Resposta
        function selectAnswer(index) {
            if (answered) return;

            // Remover seleção anterior
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));

            // Adicionar nova seleção
            selectedAnswer = index;
            document.querySelectorAll('.option')[index].classList.add('selected');
        }

        // Confirmar Resposta
        function confirmAnswer() {
            if (selectedAnswer === null) {
                alert('Por favor, selecione uma resposta!');
                return;
            }

            answered = true;
            const question = quizData[currentQuestion];
            const isCorrect = selectedAnswer === question.correct;

            // Mostrar resultado
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.add('disabled'));

            // Destacar resposta correta
            options[question.correct].classList.add('correct');

            // Destacar resposta do usuário se errada
            if (!isCorrect) {
                options[selectedAnswer].classList.add('incorrect');
            }

            // Atualizar score
            if (isCorrect) {
                score++;
                document.getElementById('scoreText').textContent = `Acertos: ${score}`;
            }

            // Mostrar feedback
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');
            if (isCorrect) {
                feedback.classList.add('correct');
                feedback.textContent = '✓ Correto!';
            } else {
                feedback.classList.add('incorrect');
                feedback.textContent = '✗ Resposta Incorreta';
            }

            // Mostrar botão próxima
            document.getElementById('confirmBtn').style.display = 'none';
            document.getElementById('nextBtn').classList.add('show');
        }

        // Próxima Pergunta
        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // Mostrar Resultados
        function showResults() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            const percentage = Math.round((score / quizData.length) * 100);
            let message = '';

            if (percentage >= 80) {
                message = '🌟 Excelente! Você tem um excelente conhecimento sobre a Carta aos Gálatas!';
            } else if (percentage >= 50) {
                message = '👍 Bom! Você tem um bom conhecimento, mas pode melhorar ainda mais!';
            } else {
                message = '📚 Precisa melhorar! Continue estudando a Carta aos Gálatas!';
            }

            document.getElementById('finalScore').textContent = `${score}/61`;
            document.getElementById('finalPercentage').textContent = `${percentage}%`;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = 61 - score;
        }

        // Reiniciar Quiz
        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedAnswer = null;
            answered = false;

            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }
    </script>
