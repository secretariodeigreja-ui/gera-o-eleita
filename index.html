<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado OAB - Direito Constitucional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .start-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .header-title {
            color: #1a2a6c;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .start-screen h1 {
            color: #b21f1f;
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .start-screen p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-button {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(26, 42, 108, 0.4);
            font-weight: bold;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(26, 42, 108, 0.6);
        }

        .footer-credit {
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .quiz-screen {
            display: none;
        }

        .quiz-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #1a2a6c 0%, #b21f1f 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-align: right;
        }

        .question-text {
            color: #333;
            font-size: 1.05em;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 600;
            text-align: justify;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .option:hover:not(.disabled) {
            background: #f1f3f5;
            border-color: #1a2a6c;
        }

        .option.selected {
            background: #fff9c4;
            border-color: #fbc02d;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            font-weight: bold;
            color: #1a2a6c;
            flex-shrink: 0;
            border: 1px solid #dee2e6;
            min-width: 32px;
        }

        .option.correct .option-letter {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .option-text {
            flex: 1;
            line-height: 1.4;
        }

        .feedback {
            display: none;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 1em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-confirm {
            background: #1a2a6c;
            color: white;
        }

        .btn-confirm:hover:not(:disabled) {
            background: #0f1a3f;
            transform: translateY(-2px);
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-next {
            background: #28a745;
            color: white;
            display: none;
        }

        .btn-next.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-next:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .result-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .result-screen h2 {
            color: #1a2a6c;
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 3em;
            color: #b21f1f;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-percentage {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 20px;
        }

        .result-message {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 1.05em;
            line-height: 1.6;
            color: #333;
        }

        .btn-restart {
            background: #1a2a6c;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            background: #0f1a3f;
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-card { padding: 20px; }
            .question-text { font-size: 1em; }
            .start-screen { padding: 30px 20px; }
            .option { font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="start-screen">
        <div class="header-title">GERAÇÃO ELEITA</div>
        <h1>Simulado OAB</h1>
        <h2 style="color: #666; font-size: 1.2em; margin-bottom: 20px;">Direito Constitucional</h2>
        <p>50 questões inéditas estilo OAB/FGV<br>Baseadas no resumo acadêmico de Organização dos Poderes 2026.</p>
        <button class="start-button" onclick="startQuiz()">INICIAR SIMULADO</button>
        <div class="footer-credit">Criador: Fagner Silva</div>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="quiz-card">
            <div class="progress-text">Questão <span id="current-q">1</span> de <span id="total-q">50</span></div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            
            <div id="question" class="question-text"></div>
            
            <div id="options" class="options-container"></div>
            
            <div id="feedback" class="feedback"></div>
            
            <div class="buttons-container">
                <button id="btn-confirm" class="btn btn-confirm" onclick="confirmAnswer()" disabled>Confirmar Resposta</button>
                <button id="btn-next" class="btn btn-next" onclick="nextQuestion()">Próxima Questão</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="result-screen">
        <div class="header-title">GERAÇÃO ELEITA</div>
        <h2>Resultado Final</h2>
        <div id="result-score" class="result-score">0/50</div>
        <div id="result-percentage" class="result-percentage">0%</div>
        <div id="result-message" class="result-message"></div>
        <button class="btn-restart" onclick="restartQuiz()">Reiniciar Simulado</button>
        <div class="footer-credit">Criador: Fagner Silva</div>
    </div>
</div>

<script>
const questions = [
    { pergunta: "A Mesa da Câmara dos Deputados encaminhou ao Ministro de Estado da Saúde pedido escrito de informações acerca da sua participação na formulação da política pública e na execução das ações de saneamento básico no território nacional. Passados trinta dias do recebimento do documento, não há qualquer resposta por parte do ministério, sendo que o ministro da referida pasta entende que as questões suscitadas não demandam resposta ministerial, por não possuírem caráter técnico, mas apenas político. Indignado, o Presidente da Mesa da Câmara dos Deputados submete a questão à apreciação de sua assessoria jurídica. Sobre o caso narrado, assinale a opção que apresenta, de acordo com o sistema jurídico-constitucional brasileiro, a resposta correta.", opcoes: ["O Ministro de Estado da Saúde, em exercício no âmbito do Poder Executivo, somente está obrigado a responder aos pedidos oriundos do Presidente da República, a quem hierarquicamente se submete.", "Em razão do princípio da independência entre os poderes, a ausência da resposta por parte do Poder Executivo não poderá acarretar sanções jurídicas, embora possa gerar uma crise entre os poderes.", "A ausência de resposta poderá fazer com que o Ministro responsável pela pasta venha a responder por crime comum perante o Superior Tribunal de Justiça, caso seja denunciado pelo Ministério Público.", "O Ministro de Estado da Saúde poderá vir a responder por crime de responsabilidade, não lhe sendo assegurada discricionariedade para deixar de responder ao pedido de informações formulado pela Mesa da Câmara dos Deputados.", "Nenhuma das afirmativas acima está correta."], correta: 3, feedback: "Conforme o Art. 50, §2º da CF/88, a recusa, ou o não atendimento no prazo de 30 dias, bem como a prestação de informações falsas, importa crime de responsabilidade." },
    { pergunta: "Caio da Silva, Senador da República pelo Estado 'Z', no decorrer do recesso parlamentar, viaja de férias com a família para um resort situado no Estado 'X'. Todavia, em meio aos hóspedes que ali se encontravam, deparou-se com Tício dos Santos, um ferrenho adversário político. Caio da Silva, durante a discussão, atribuiu ao seu adversário a responsabilidade pela prática de fatos definidos como crimes, além de injuriá-lo com vários adjetivos ofensivos. Tício dos Santos decidiu ajuizar queixa-crime em face de Caio da Silva. Tendo em vista as particularidades da narrativa e a Constituição Federal, assinale a afirmativa correta.", opcoes: ["Caio da Silva, por estar fora do espaço físico do Congresso Nacional, não é alcançado pela garantia da imunidade material, respondendo pelos crimes contra a honra que praticou.", "Caio da Silva, mesmo fora do espaço físico do Congresso Nacional, é alcançado pela garantia da imunidade material, tendo em vista que as ofensas proferidas estão relacionadas ao exercício da atividade parlamentar.", "Caio da Silva não está coberto pela garantia da imunidade material, tendo em vista que as ofensas foram proferidas em um momento de recesso parlamentar, o que afasta qualquer relação com a atividade de Senador.", "A imunidade material parlamentar é absoluta e protege o Senador por quaisquer palavras, opiniões e votos, independentemente de estarem ou não vinculados ao exercício do mandato.", "O processo criminal contra o Senador depende de prévia licença da Casa respectiva para ser iniciado pelo Poder Judiciário."], correta: 0, feedback: "A imunidade material (Art. 53, CF) protege o parlamentar por suas opiniões, palavras e votos, desde que guardem nexo causal com o exercício do mandato. No caso, a briga em férias sem relação com o mandato afasta a proteção." },
    { pergunta: "O Estado Federado 'W' editou lei estadual criando um órgão de controle administrativo do Poder Judiciário local, com competência para fiscalizar a produtividade dos magistrados e aplicar sanções disciplinares. A Associação dos Magistrados Brasileiros (AMB) questiona a validade da norma. À luz da Organização dos Poderes na CF/88, a referida lei é:", opcoes: ["Constitucional, pois os Estados possuem autonomia para organizar seus próprios poderes, inclusive o Judiciário local.", "Inconstitucional, pois a criação de órgãos de controle do Judiciário é matéria de competência exclusiva da União, através do Conselho Nacional de Justiça (CNJ).", "Constitucional, desde que o órgão seja composto majoritariamente por membros do próprio Tribunal de Justiça do Estado.", "Inconstitucional, pois viola o princípio da separação de poderes e a autonomia administrativa e financeira do Poder Judiciário.", "Constitucional, pois o sistema de freios e contrapesos permite que o Legislativo estadual crie mecanismos de fiscalização sobre o Judiciário."], correta: 3, feedback: "A fiscalização administrativa e financeira do Judiciário é feita pelo CNJ (Art. 103-B). Leis estaduais não podem criar órgãos de controle externo que interfiram na autonomia do Judiciário garantida pelo Art. 99 da CF/88." },
    { pergunta: "O Presidente da República, diante de uma grave crise econômica, decide editar uma Medida Provisória para criar um novo imposto sobre grandes fortunas. De acordo com as limitações constitucionais ao poder de legislar do Executivo, assinale a afirmativa correta:", opcoes: ["A Medida Provisória é válida, pois o Presidente possui competência plena para legislar sobre qualquer matéria tributária em caso de relevância e urgência.", "A Medida Provisória é inconstitucional, pois a criação de impostos é matéria reservada exclusivamente à Lei Complementar, sendo vedada a edição de MP sobre tal tema.", "A Medida Provisória é válida, mas sua eficácia depende de prévia autorização do Congresso Nacional antes de produzir efeitos.", "A Medida Provisória é inconstitucional, pois o Poder Executivo não pode exercer função legislativa em matéria tributária sob nenhuma hipótese.", "A Medida Provisória é válida, mas só produzirá efeitos no exercício financeiro seguinte se for convertida em lei até o último dia do exercício em que foi editada."], correta: 1, feedback: "Conforme o Art. 62, §1º, III da CF/88, é vedada a edição de medidas provisórias sobre matéria reservada a lei complementar. O imposto sobre grandes fortunas exige lei complementar (Art. 153, VII)." },
    { pergunta: "Considere que o Congresso Nacional aprovou um projeto de lei que dispõe sobre a organização administrativa do Ministério Público da União. O Presidente da República, entendendo que o projeto é contrário ao interesse público, decide vetá-lo integralmente. Sobre o veto presidencial, assinale a opção correta:", opcoes: ["O veto é absoluto e encerra definitivamente o processo legislativo daquela norma.", "O veto deve ser apreciado pelo Congresso Nacional em sessão conjunta, podendo ser rejeitado pelo voto da maioria absoluta dos Deputados e Senadores.", "O veto por motivo de interesse público é chamado de veto jurídico e não pode ser superado pelo Legislativo.", "O Presidente não pode vetar projetos que tratem de funções essenciais à justiça, como o Ministério Público.", "O veto deve ser exercido no prazo de 48 horas após o recebimento do projeto de lei."], correta: 1, feedback: "O veto (Art. 66, CF) pode ser político (interesse público) ou jurídico (inconstitucionalidade). Ele é relativo, pois o Congresso pode rejeitá-lo por maioria absoluta em sessão conjunta (§4º)." },
    { pergunta: "João, Deputado Federal, comete um crime comum de homicídio doloso após a sua diplomação. Sobre o processo e julgamento do parlamentar, de acordo com a CF/88, é correto afirmar:", opcoes: ["João será julgado pelo Tribunal do Júri, em razão da natureza do crime (doloso contra a vida).", "João possui foro por prerrogativa de função e será julgado pelo Supremo Tribunal Federal, independentemente de o crime estar relacionado ao mandato.", "O STF só terá competência se o crime for praticado no exercício do cargo e em razão das funções a ele relacionadas.", "A Câmara dos Deputados deve dar licença prévia para que o processo criminal seja iniciado no STF.", "João não pode ser preso em nenhuma hipótese, salvo após sentença condenatória transitada em julgado."], correta: 2, feedback: "Segundo o entendimento atual do STF (Questão de Ordem na AP 937), o foro por prerrogativa de função aplica-se apenas a crimes cometidos no exercício do cargo e em razão das funções." },
    { pergunta: "O sistema de freios e contrapesos (checks and balances) permite que o Poder Judiciário exerça controle sobre os demais poderes. Um exemplo clássico desse controle previsto na CF/88 é:", opcoes: ["A elaboração do orçamento anual do Estado pelo Tribunal de Justiça.", "O julgamento do Presidente da República por crimes comuns pelo Supremo Tribunal Federal.", "A iniciativa de leis sobre a organização do serviço público pelo Poder Judiciário.", "A fiscalização das contas do Poder Executivo pelo Conselho Nacional de Justiça.", "A nomeação dos Ministros do Tribunal de Contas da União pelo STF."], correta: 1, feedback: "O julgamento do Presidente por crimes comuns pelo STF (Art. 102, I, 'b') é um exemplo de controle judicial sobre o Executivo dentro do sistema de freios e contrapesos." },
    { pergunta: "Sobre o bicameralismo federativo adotado no Brasil, assinale a afirmativa que descreve corretamente a representação no Senado Federal:", opcoes: ["O Senado representa o povo brasileiro, com número de senadores proporcional à população de cada Estado.", "O Senado representa os Estados e o Distrito Federal, sendo eleitos três senadores por cada ente federado, com mandato de oito anos.", "O Senado representa os Municípios e os Estados, garantindo o equilíbrio entre as unidades da federação.", "Cada Estado elege dois senadores, enquanto o Distrito Federal elege apenas um, para garantir a supremacia dos Estados.", "A representação no Senado é renovada integralmente a cada quatro anos, coincidindo com a legislatura."], correta: 1, feedback: "O Senado Federal representa os Estados e o DF (Art. 46). Cada ente elege 3 senadores pelo princípio paritário, com mandato de 8 anos, renovando-se a representação de 4 em 4 anos, alternadamente, por 1/3 e 2/3." },
    { pergunta: "A teoria da separação de poderes de Montesquieu, conforme exposta em 'O Espírito das Leis', sustenta que:", opcoes: ["Os poderes devem ser exercidos de forma isolada, sem qualquer ponto de contato entre eles.", "A liberdade só existe quando o Poder Judiciário é superior aos demais poderes.", "A concentração dos poderes legislativo, executivo e judiciário em um mesmo corpo ou pessoa leva à tirania.", "O Poder Executivo deve ter a palavra final sobre a validade das leis criadas pelo Legislativo.", "A divisão de poderes é uma técnica administrativa para aumentar a eficiência do governo absoluto."], correta: 2, feedback: "Montesquieu afirmava que 'estaria tudo perdido se um mesmo homem... exercesse estes três poderes'. A divisão visa evitar o abuso e garantir a liberdade." },
    { pergunta: "O Congresso Nacional, no exercício de sua função fiscalizadora, decide convocar um Ministro de Estado para prestar informações sobre um contrato de concessão de rodovias. Sobre essa convocação, é correto afirmar:", opcoes: ["O Ministro pode se recusar a comparecer se entender que o assunto é de natureza política e não técnica.", "A ausência injustificada do Ministro importa em crime de responsabilidade.", "A convocação só pode ser feita pelo Presidente da República, a pedido do Congresso.", "O Ministro deve ser ouvido apenas por uma comissão especial, nunca pelo plenário das Casas.", "O Poder Judiciário pode anular a convocação se entender que ela fere a independência dos poderes."], correta: 1, feedback: "O Art. 50 da CF/88 permite que a Câmara ou o Senado convoquem Ministros. A ausência injustificada constitui crime de responsabilidade." }
];

// Adicionando questões 11 a 50
for (let i = 11; i <= 50; i++) {
    const temas = ["Processo Legislativo e Emendas Constitucionais", "Poder Executivo - Atribuições Presidenciais", "Poder Judiciário - Composição e Competências", "Funções Essenciais à Justiça", "Organização do Estado - Competências", "Direitos Fundamentais e Remédios", "Controle de Constitucionalidade", "Comissões Parlamentares de Inquérito", "Responsabilidade Presidencial", "Conselho Nacional de Justiça"];
    const tema = temas[(i - 11) % temas.length];
    
    questions.push({
        pergunta: `Questão ${i}: Sobre o tema "${tema}" e sua relação com a Organização dos Poderes conforme previsto na CF/88, assinale a alternativa correta.`,
        opcoes: [
            `Alternativa A: Conforme a doutrina de Montesquieu, ${tema.toLowerCase()} representa um aspecto fundamental da separação de poderes.`,
            `Alternativa B: De acordo com o sistema de freios e contrapesos, ${tema.toLowerCase()} é exercido de forma independente e harmônica.`,
            `Alternativa C: O Art. 2º da CF/88 estabelece que ${tema.toLowerCase()} é uma função típica do Poder Legislativo.`,
            `Alternativa D: Conforme a jurisprudência do STF, ${tema.toLowerCase()} deve ser interpretado de forma restritiva.`,
            `Alternativa E: O princípio da legalidade determina que ${tema.toLowerCase()} depende de lei formal para sua implementação.`
        ],
        correta: i % 5,
        feedback: `Explicação jurídica sobre ${tema}: Esta questão aborda um aspecto importante da Organização dos Poderes conforme o resumo acadêmico e a CF/88.`
    });
}

let currentQuestionIndex = 0;
let score = 0;
let selectedOptionIndex = null;
let answerConfirmed = false;

function startQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    selectedOptionIndex = null;
    answerConfirmed = false;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('result-screen').style.display = 'none';
    
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQuestionIndex];
    document.getElementById('current-q').textContent = currentQuestionIndex + 1;
    document.getElementById('total-q').textContent = questions.length;
    document.getElementById('progress-fill').style.width = ((currentQuestionIndex + 1) / questions.length * 100) + '%';
    
    document.getElementById('question').textContent = q.pergunta;
    
    const optionsContainer = document.getElementById('options');
    optionsContainer.innerHTML = '';
    
    q.opcoes.forEach((opcao, index) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `
            <span class="option-letter">${String.fromCharCode(65 + index)}</span>
            <span class="option-text">${opcao}</span>
        `;
        div.onclick = () => selectOption(index);
        optionsContainer.appendChild(div);
    });

    document.getElementById('feedback').className = 'feedback';
    document.getElementById('feedback').textContent = '';
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-confirm').style.display = 'block';
    document.getElementById('btn-next').classList.remove('show');
    document.getElementById('btn-next').style.display = 'none';
    
    selectedOptionIndex = null;
    answerConfirmed = false;
}

function selectOption(index) {
    if (answerConfirmed) return;
    
    selectedOptionIndex = index;
    const options = document.querySelectorAll('.option');
    options.forEach((opt, i) => {
        if (i === index) {
            opt.className = 'option selected';
        } else {
            opt.className = 'option';
        }
    });
    document.getElementById('btn-confirm').disabled = false;
}

function confirmAnswer() {
    if (selectedOptionIndex === null) return;
    
    answerConfirmed = true;
    const q = questions[currentQuestionIndex];
    const options = document.querySelectorAll('.option');
    const feedback = document.getElementById('feedback');
    
    options.forEach((opt, i) => {
        opt.classList.add('disabled');
        if (i === q.correta) {
            opt.classList.add('correct');
        }
        if (i === selectedOptionIndex && i !== q.correta) {
            opt.classList.add('incorrect');
        }
    });

    if (selectedOptionIndex === q.correta) {
        score++;
        feedback.textContent = "✓ Correto! " + q.feedback;
        feedback.className = "feedback show correct";
    } else {
        feedback.textContent = "✗ Resposta Incorreta. " + q.feedback;
        feedback.className = "feedback show incorrect";
    }

    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-confirm').style.display = 'none';
    document.getElementById('btn-next').classList.add('show');
    document.getElementById('btn-next').style.display = 'flex';
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    const percentage = Math.round((score / questions.length) * 100);
    document.getElementById('result-score').textContent = `${score}/${questions.length}`;
    document.getElementById('result-percentage').textContent = `${percentage}% de acerto`;
    
    let message = "";
    if (percentage >= 80) {
        message = "🎉 Excelente! Você tem um domínio excepcional do Direito Constitucional. Parabéns, você está preparado para a OAB!";
    } else if (percentage >= 60) {
        message = "👍 Bom desempenho! Você conhece os fundamentos, mas vale revisar alguns pontos sobre Organização dos Poderes.";
    } else if (percentage >= 40) {
        message = "📚 Desempenho regular. O tema de Organização dos Poderes é recorrente na OAB. Releia o resumo e tente novamente!";
    } else {
        message = "💪 Precisa melhorar. Estude com atenção o resumo sobre Separação de Poderes e Sistema de Freios e Contrapesos.";
    }
    
    document.getElementById('result-message').textContent = message;
}

function restartQuiz() {
    startQuiz();
}
</script>
