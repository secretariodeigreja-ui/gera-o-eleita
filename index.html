<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz OAB - Direito Constitucional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        /* Tela Inicial */
        .start-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .header-title {
            color: #1a2a6c;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .start-screen h1 {
            color: #b21f1f;
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .start-screen p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-button {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(26, 42, 108, 0.4);
            font-weight: bold;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(26, 42, 108, 0.6);
        }

        .footer-credit {
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        /* Tela do Quiz */
        .quiz-screen {
            display: none;
        }

        .quiz-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        /* Barra de Progresso */
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #1a2a6c 0%, #b21f1f 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-align: right;
        }

        /* Pergunta */
        .question-text {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 600;
            text-align: justify;
        }

        /* Opções */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover:not(.disabled) {
            background: #f1f3f5;
            border-color: #1a2a6c;
        }

        .option.selected {
            background: #fff9c4;
            border-color: #fbc02d;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            font-weight: bold;
            color: #1a2a6c;
            flex-shrink: 0;
            border: 1px solid #dee2e6;
        }

        .option.correct .option-letter {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* Feedback */
        .feedback {
            display: none;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.4;
            animation: slideIn 0.3s ease-out;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }

        /* Botões */
        .buttons-container {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 1em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-confirm {
            background: #1a2a6c;
            color: white;
        }

        .btn-confirm:hover:not(:disabled) {
            background: #0f1a3f;
            transform: translateY(-2px);
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-next {
            background: #28a745;
            color: white;
            display: none;
        }

        .btn-next.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-next:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        /* Tela de Resultado */
        .result-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .result-screen h2 {
            color: #1a2a6c;
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 3em;
            color: #b21f1f;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-percentage {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 20px;
        }

        .result-message {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 1.05em;
            line-height: 1.6;
            color: #333;
        }

        .btn-restart {
            background: #1a2a6c;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            background: #0f1a3f;
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-card { padding: 20px; }
            .question-text { font-size: 1.1em; }
            .start-screen { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Tela Inicial -->
    <div id="start-screen" class="start-screen">
        <div class="header-title">GERAÇÃO ELEITA</div>
        <h1>Simulado OAB</h1>
        <h2 style="color: #666; font-size: 1.2em; margin-bottom: 20px;">Direito Constitucional</h2>
        <p>Organização dos Poderes e Teoria da Constituição.<br>Baseado no resumo acadêmico 2026.</p>
        <button class="start-button" onclick="startQuiz()">INICIAR SIMULADO</button>
        <div class="footer-credit">Criador: Fagner Silva</div>
    </div>

    <!-- Tela do Quiz -->
    <div id="quiz-screen" class="quiz-screen">
        <div class="quiz-card">
            <div class="progress-text">Questão <span id="current-q">1</span> de <span id="total-q">15</span></div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            
            <div id="question" class="question-text"></div>
            
            <div id="options" class="options-container"></div>
            
            <div id="feedback" class="feedback"></div>
            
            <div class="buttons-container">
                <button id="btn-confirm" class="btn btn-confirm" onclick="confirmAnswer()" disabled>Confirmar Resposta</button>
                <button id="btn-next" class="btn btn-next" onclick="nextQuestion()">Próxima Questão</button>
            </div>
        </div>
    </div>

    <!-- Tela de Resultado -->
    <div id="result-screen" class="result-screen">
        <div class="header-title">GERAÇÃO ELEITA</div>
        <h2>Resultado Final</h2>
        <div id="result-score" class="result-score">0/15</div>
        <div id="result-percentage" class="result-percentage">0%</div>
        <div id="result-message" class="result-message"></div>
        <button class="btn-restart" onclick="restartQuiz()">Reiniciar Simulado</button>
        <div class="footer-credit">Criador: Fagner Silva</div>
    </div>
</div>

<script>
    const questions = [
        {
            pergunta: "O Estado Alfa editou uma lei que cria mecanismos de controle prévio pelo Poder Executivo sobre as decisões de mérito do Poder Judiciário estadual, sob a justificativa de garantir a eficiência administrativa. À luz da Constituição Federal de 1988 e da teoria da separação dos poderes, essa lei é:",
            opcoes: [
                "Constitucional, pois concretiza o sistema de freios e contrapesos (checks and balances).",
                "Inconstitucional, pois viola a independência e harmonia entre os poderes, núcleo imutável da CF/88.",
                "Constitucional, desde que haja previsão similar na Constituição Estadual.",
                "Inconstitucional, pois o controle de mérito do Judiciário só pode ser feito pelo Poder Legislativo."
            ],
            correta: 1,
            feedback: "A separação de poderes (Art. 2º da CF/88) impede que um poder interfira na função típica de outro sem previsão constitucional expressa. O controle de mérito do Judiciário pelo Executivo viola a independência judicial."
        },
        {
            pergunta: "O Presidente da República edita uma Medida Provisória dispondo sobre matéria tributária. Nessa situação, o Poder Executivo está exercendo uma:",
            opcoes: [
                "Função típica administrativa.",
                "Função atípica de julgamento.",
                "Função atípica legislativa.",
                "Função típica legislativa."
            ],
            correta: 2,
            feedback: "A edição de Medidas Provisórias (Art. 62) é um exemplo de função atípica legislativa do Poder Executivo, pois sua função típica é a administrativa."
        },
        {
            pergunta: "Sobre o sistema de freios e contrapesos (checks and balances), assinale a alternativa que apresenta um exemplo de controle do Poder Legislativo sobre o Poder Executivo:",
            opcoes: [
                "O veto presidencial a um projeto de lei aprovado pelo Congresso.",
                "A declaração de inconstitucionalidade de um decreto pelo STF.",
                "A competência do Congresso Nacional para fiscalizar os atos do Executivo.",
                "A nomeação de Ministros de Estado pelo Presidente da República."
            ],
            correta: 2,
            feedback: "Conforme o Art. 49, X, da CF/88, compete ao Congresso Nacional fiscalizar e controlar os atos do Poder Executivo."
        },
        {
            pergunta: "No sistema bicameral federativo brasileiro, o Senado Federal é composto por representantes:",
            opcoes: [
                "Do povo, eleitos por sistema proporcional.",
                "Dos Estados e do Distrito Federal, eleitos por sistema majoritário.",
                "Dos Municípios e dos Estados, de forma paritária.",
                "Do povo, garantindo-se o mínimo de 8 e o máximo de 70 por ente."
            ],
            correta: 1,
            feedback: "O Senado Federal representa os Estados e o DF (Art. 46), com representação paritária (3 senadores por ente), enquanto a Câmara representa o povo."
        },
        {
            pergunta: "A decisão histórica da Suprema Corte dos EUA no caso Marbury v. Madison (1803) é considerada o marco fundamental de qual instituto jurídico?",
            opcoes: [
                "O Presidencialismo de Coalizão.",
                "O Federalismo Cooperativo.",
                "O Judicial Review (Controle de Constitucionalidade).",
                "O Devido Processo Legal Substantivo."
            ],
            correta: 2,
            feedback: "O caso Marbury v. Madison estabeleceu o poder do Judiciário de declarar a inconstitucionalidade de leis contrárias à Constituição."
        },
        {
            pergunta: "Quando o Senado Federal processa e julga o Presidente da República por crime de responsabilidade, ele está exercendo uma:",
            opcoes: [
                "Função típica legislativa.",
                "Função atípica administrativa.",
                "Função atípica de julgamento.",
                "Função típica judiciária."
            ],
            correta: 2,
            feedback: "O julgamento de autoridades pelo Legislativo (Art. 52, I e II) é uma função atípica de julgamento, pois a função típica do Legislativo é legislar e fiscalizar."
        },
        {
            pergunta: "Segundo a doutrina de Montesquieu, a finalidade principal da separação de poderes é:",
            opcoes: [
                "Aumentar a celeridade das decisões estatais.",
                "Evitar a concentração de poder e garantir a liberdade individual.",
                "Subordinar o Judiciário ao Legislativo, que representa o povo.",
                "Permitir que o soberano governe sem interferências externas."
            ],
            correta: 1,
            feedback: "Montesquieu defendia que a divisão de funções evitaria o abuso de poder e protegeria a liberdade dos cidadãos contra a tirania."
        },
        {
            pergunta: "Sobre a organização do Poder Legislativo nos Estados e Municípios, é correto afirmar que:",
            opcoes: [
                "Adotam o sistema bicameral, seguindo o modelo federal.",
                "Adotam o sistema unicameral, composto apenas por uma Casa Legislativa.",
                "Os Municípios possuem Senado Municipal para representar os distritos.",
                "O Distrito Federal é o único ente subnacional com sistema bicameral."
            ],
            correta: 1,
            feedback: "Diferente da União, os Estados, o DF e os Municípios adotam o sistema unicameral (Assembleias Legislativas, Câmara Legislativa e Câmaras Municipais)."
        },
        {
            pergunta: "O conceito de 'Constituição Mista', que remonta às origens da ideia de separação de poderes, foi inicialmente defendido por:",
            opcoes: [
                "John Locke.",
                "Barão de Montesquieu.",
                "Aristóteles.",
                "James Madison."
            ],
            correta: 2,
            feedback: "As origens da ideia remontam a Aristóteles em sua obra 'Política', onde defendia um governo equilibrado."
        },
        {
            pergunta: "A duração de uma legislatura no Brasil, de acordo com o Art. 44, parágrafo único, da CF/88, é de:",
            opcoes: [
                "Dois anos.",
                "Quatro anos.",
                "Oito anos.",
                "Cinco anos."
            ],
            correta: 1,
            feedback: "A legislatura tem duração de 4 anos, coincidindo com o mandato dos Deputados Federais."
        },
        {
            pergunta: "O Poder Federativo, concebido por John Locke, referia-se à competência para:",
            opcoes: [
                "Legislar sobre temas de interesse nacional.",
                "Relacionamento com estrangeiros, alianças e decisões sobre guerra e paz.",
                "Julgar conflitos entre particulares.",
                "Administrar as finanças públicas da comunidade."
            ],
            correta: 1,
            feedback: "Locke propôs o Poder Federativo para lidar com questões externas, embora hoje essa função seja absorvida pelo Executivo."
        },
        {
            pergunta: "A Constituição Federal de 1988 adotou qual modelo de separação de poderes?",
            opcoes: [
                "Separação rígida e absoluta.",
                "Separação flexível, com funções típicas e atípicas.",
                "Parlamentarismo puro, com fusão de poderes.",
                "Supremacia absoluta do Poder Judiciário."
            ],
            correta: 1,
            feedback: "A CF/88 adota a separação flexível, permitindo que poderes exerçam funções atípicas para garantir o equilíbrio do sistema."
        },
        {
            pergunta: "Qual destes órgãos NÃO faz parte da estrutura do Poder Judiciário, conforme o Título IV da CF/88?",
            opcoes: [
                "Superior Tribunal de Justiça.",
                "Tribunal de Contas da União.",
                "Tribunais Regionais Federais.",
                "Tribunal Superior do Trabalho."
            ],
            correta: 1,
            feedback: "O TCU é um órgão técnico que auxilia o Congresso Nacional na fiscalização contábil, não integrando o Poder Judiciário."
        },
        {
            pergunta: "A competência do Presidente da República para vetar projetos de lei por motivo de inconstitucionalidade (veto jurídico) é um exemplo de:",
            opcoes: [
                "Controle jurisdicional de constitucionalidade.",
                "Controle político preventivo de constitucionalidade.",
                "Função típica do Poder Executivo.",
                "Abuso de prerrogativa legislativa."
            ],
            correta: 1,
            feedback: "O veto jurídico é uma forma de controle de constitucionalidade exercida pelo Executivo antes da lei entrar em vigor (preventivo)."
        },
        {
            pergunta: "O princípio da 'Rule of Law' (Estado de Direito), na visão de Locke, exige a separação de poderes para que:",
            opcoes: [
                "O Rei possa governar por decretos sem oposição.",
                "A lei seja aplicada de forma imparcial por quem não a criou.",
                "O povo possa revogar leis a qualquer momento.",
                "O Judiciário tenha a última palavra sobre impostos."
            ],
            correta: 1,
            feedback: "Para Locke, a imparcialidade exige que quem faz a lei (Legislativo) não seja o mesmo que a aplica (Executivo/Judiciário)."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptionIndex = null;
    let answerConfirmed = false;

    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        selectedOptionIndex = null;
        answerConfirmed = false;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('current-q').textContent = currentQuestionIndex + 1;
        document.getElementById('total-q').textContent = questions.length;
        document.getElementById('progress-fill').style.width = ((currentQuestionIndex + 1) / questions.length * 100) + '%';
        
        document.getElementById('question').textContent = q.pergunta;
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        
        q.opcoes.forEach((opcao, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `
                <span class="option-letter">${String.fromCharCode(65 + index)}</span>
                <span class="option-text">${opcao}</span>
            `;
            div.onclick = () => selectOption(index);
            optionsContainer.appendChild(div);
        });

        document.getElementById('feedback').className = 'feedback';
        document.getElementById('feedback').textContent = '';
        document.getElementById('btn-confirm').disabled = true;
        document.getElementById('btn-confirm').style.display = 'block';
        document.getElementById('btn-next').classList.remove('show');
        document.getElementById('btn-next').style.display = 'none';
        
        selectedOptionIndex = null;
        answerConfirmed = false;
    }

    function selectOption(index) {
        if (answerConfirmed) return;
        
        selectedOptionIndex = index;
        const options = document.querySelectorAll('.option');
        options.forEach((opt, i) => {
            if (i === index) {
                opt.className = 'option selected';
            } else {
                opt.className = 'option';
            }
        });
        document.getElementById('btn-confirm').disabled = false;
    }

    function confirmAnswer() {
        if (selectedOptionIndex === null) return;
        
        answerConfirmed = true;
        const q = questions[currentQuestionIndex];
        const options = document.querySelectorAll('.option');
        const feedback = document.getElementById('feedback');
        
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === q.correta) {
                opt.classList.add('correct');
            }
            if (i === selectedOptionIndex && i !== q.correta) {
                opt.classList.add('incorrect');
            }
        });

        if (selectedOptionIndex === q.correta) {
            score++;
            feedback.textContent = "✓ Correto! " + q.feedback;
            feedback.className = "feedback show correct";
        } else {
            feedback.textContent = "✗ Resposta Incorreta. " + q.feedback;
            feedback.className = "feedback show incorrect";
        }

        document.getElementById('btn-confirm').disabled = true;
        document.getElementById('btn-confirm').style.display = 'none';
        document.getElementById('btn-next').classList.add('show');
        document.getElementById('btn-next').style.display = 'flex';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const percentage = Math.round((score / questions.length) * 100);
        document.getElementById('result-score').textContent = `${score}/${questions.length}`;
        document.getElementById('result-percentage').textContent = `${percentage}% de acerto`;
        
        let message = "";
        if (percentage >= 80) {
            message = "🎉 Excelente! Você tem um domínio excepcional da Organização dos Poderes. Continue assim para a OAB!";
        } else if (percentage >= 50) {
            message = "👍 Bom desempenho! Você conhece os fundamentos, mas vale revisar os detalhes das funções atípicas e do sistema de freios e contrapesos.";
        } else {
            message = "📚 Precisa melhorar. O tema de Organização dos Poderes é recorrente na OAB. Releia o resumo e tente o simulado novamente!";
        }
        
        document.getElementById('result-message').textContent = message;
    }

    function restartQuiz() {
        startQuiz();
    }
</script>

</body>
</html>
